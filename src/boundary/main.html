<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe 3D</title>
    <!-- Estilos de la página principal -->
    <style>
        /* Estilos generales del documento (fondo, fuente, centrado) */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #1f2746 0%, #0d111f 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* --- MENÚ PRINCIPAL GLASSMORPHISM --- */
        #menu-container {
            background: rgba(20, 30, 50, 0.2);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            border-left: 1px solid rgba(255, 255, 255, 0.3);
            padding: 3.5rem 5rem;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.02);
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 25px;
            position: relative;
        }

        h1 {
            color: rgba(255, 255, 255, 0.95);
            text-shadow: 0 0 10px rgba(233, 69, 96, 0.8), 0 0 20px rgba(233, 69, 96, 0.6);
            margin-bottom: 30px;
            font-size: 2.8rem;
            letter-spacing: 3px;
        }

        .btn {
            background: rgba(233, 69, 96, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #fff;
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            border-left: 1px solid rgba(255, 255, 255, 0.3);
            padding: 15px 30px;
            font-size: 1.1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .btn:hover {
            background: rgba(233, 69, 96, 0.6);
            border-color: #ff2a4b;
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 25px rgba(233, 69, 96, 0.4), inset 0 0 15px rgba(255, 255, 255, 0.2);
            text-shadow: 0 0 8px #fff;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 15, 30, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: rgba(20, 30, 50, 0.25);
            padding: 3rem;
            border-radius: 30px;
            border: 1px solid rgba(233, 69, 96, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            border-left: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 60px rgba(0,0,0,0.6), inset 0 0 20px rgba(255, 255, 255, 0.05);
            color: white;
            text-align: center;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .symbol-selection {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 25px;
        }

        .symbol-btn {
            width: 100px;
            height: 100px;
            font-size: 3rem;
            background: rgba(15, 52, 96, 0.2);
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-top: 2px solid rgba(255, 255, 255, 0.4);
            border-left: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        /* Hover sobre botones de X y O */
        .symbol-btn:hover {
            background: rgba(233, 69, 96, 0.5);
            border-color: #ff2a4b;
            transform: translateY(-8px) scale(1.1);
            box-shadow: 0 15px 30px rgba(255, 42, 75, 0.4), inset 0 0 15px rgba(255, 255, 255, 0.3);
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 1);
        }

        /* --- Interfaz durante el juego (HUD) --- */
        /* Contenedor que aloja los marcadores de jugadores, flota sobre el canvas */
        #hud-container {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        /* DISEÑO DE TABLEROS DE TURNO (CÁPSULAS LÍQUIDAS) */
        .player-info {
            padding: 15px 40px;
            background: linear-gradient(135deg, rgba(30, 40, 70, 0.3), rgba(15, 20, 40, 0.4));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: 800;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.4);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        /* Reflejo estilo cristal interior */
        .player-info::before {
            content: '';
            position: absolute;
            top: -50%; left: -100%;
            width: 50%; height: 200%;
            background: linear-gradient(to right, rgba(255,255,255,0), rgba(255,255,255,0.2), rgba(255,255,255,0));
            transform: skewX(-20deg);
            transition: all 0.5s;
        }

        /* Clase aplicada dinámicamente cuando es el turno del jugador */
        .turno-activo {
            background: linear-gradient(135deg, rgba(233, 69, 96, 0.4), rgba(233, 69, 96, 0.8));
            border-color: rgba(255, 42, 75, 0.8);
            border-top: 1px solid rgba(255, 180, 200, 0.7);
            border-left: 1px solid rgba(255, 180, 200, 0.7);
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.9);
            box-shadow: 0 15px 40px rgba(255, 42, 75, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.2);
            transform: scale(1.15) translateY(-5px);
        }

        .turno-activo::before {
            left: 200%;
            transition: all 1s ease-in-out;
        }

        /* Contenedor del juego */
        #game-container {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Envoltura para darle el brillo rojo y la forma cuadrada exacta al canvas */
        #canvas-wrapper {
            width: 80vmin;
            height: 80vmin;
            max-width: 650px;
            max-height: 650px;
            background: rgba(10, 15, 30, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 42, 75, 0.3);
            border-top: 1px solid rgba(255, 100, 120, 0.4);
            border-left: 1px solid rgba(255, 100, 120, 0.4);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7), 0 0 30px rgba(255, 42, 75, 0.15);
            border-radius: 20px;
            overflow: hidden;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* El área de renderizado de WebGL */
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>

<!-- Menú Principal: Donde el usuario selecciona el modo de juego -->
<div id="menu-container">
    <h1>TIC TAC TOE 3D</h1>

    <button class="btn" id="btn-1v1">Jugador vs Jugador</button>
    <button class="btn" id="btn-pve">Jugador vs IA</button>
    <button class="btn" id="btn-demo">Modo Demo (IA vs IA)</button>
</div>

<!-- Modal Selección de Símbolo (Modo PvE / Contra IA) -->
<div id="symbol-modal" class="modal">
    <div class="modal-content">
        <h2>Elige tu ficha</h2>
        <div class="symbol-selection">
            <button class="symbol-btn" id="btn-select-x">X</button>
            <button class="symbol-btn" id="btn-select-o">O</button>
        </div>
        <br>
        <button class="btn" id="btn-cancel-symbol" style="margin-top:20px; background-color:#666;">Cancelar</button>
    </div>
</div>

<!-- Modal Selección de Símbolo (Modo 1v1) -->
<div id="symbol-1v1-modal" class="modal">
    <div class="modal-content">
        <h2>¿Con qué ficha jugará el Jugador 1?</h2>
        <div class="symbol-selection">
            <button class="symbol-btn" id="btn-1v1-select-x">X</button>
            <button class="symbol-btn" id="btn-1v1-select-o">O</button>
        </div>
        <p style="margin-top: 15px; color: #aaa; font-size: 0.9rem;">El Jugador 2 usará la ficha restante.</p>
        <br>
        <button class="btn" id="btn-cancel-1v1-symbol" style="margin-top:20px; background-color:#666;">Cancelar</button>
    </div>
</div>

<!-- Modal Fin del Juego: Muestra texto de victoria/empate -->
<div id="game-over-modal" class="modal">
    <div class="modal-content">
        <h2 id="game-over-text"></h2>
        <br>
        <button class="btn" id="btn-volver-menu">Volver al Menú</button>
    </div>
</div>

<!-- Canvas del Juego 3D: Contiene el HUD y renderizador de WebGL -->
<div id="game-container">

    <!-- Interfaz superpuesta (HUD) para mostrar status de turnos -->
    <div id="hud-container">
        <div id="player1-info" class="player-info">Jugador 1 [X]</div>
        <div id="player2-info" class="player-info">Jugador 2 [O]</div>
    </div>

    <!-- Render central envuelto en el marco rojo -->
    <div id="canvas-wrapper">
        <canvas id="glcanvas"></canvas>
    </div>
</div>

<!-- Enlazado del script principal (módulo) -->
<script type="module" src="../js/principal/app.js"></script>
</body>
</html>
